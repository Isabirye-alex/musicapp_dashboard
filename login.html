<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Music - Dashboard Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Dynamic Background Elements -->
    <div class="bg-mesh">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="auth-container w-100">
        <div class="text-center mb-4">
            <h2 class="fw-bold" style="color: var(--primary-color);">Atlas Music</h2>
            <p class="text-secondary">Dashboard Administration</p>
        </div>

        <!-- Login Section -->
        <div id="loginSection">
            <h4 class="mb-3">Sign In</h4>
            <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-secondary">Email address</label>
                    <input type="email" class="form-control" id="loginEmail" required placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-secondary">Don't have an account?</span>
                <a href="#" onclick="toggleAuthMode()" class="text-decoration-none ms-1" style="color: var(--primary-color);">Sign Up</a>
            </div>
        </div>

        <!-- Signup Section -->
        <div id="signupSection" class="d-none">
            <h4 class="mb-3">Create Account</h4>
            <div id="signupError" class="alert alert-danger d-none" role="alert"></div>
            <form id="signupForm">
                <div class="mb-3">
                    <label class="form-label text-secondary">Full Name</label>
                    <input type="text" class="form-control" id="signupName" required placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label class="form-label text-secondary">Email address</label>
                    <input type="email" class="form-control" id="signupEmail" required placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label class="form-label text-secondary">Password</label>
                    <input type="password" class="form-control" id="signupPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
            </form>
            <div class="text-center mt-4">
                <span class="text-secondary">Already have an account?</span>
                <a href="#" onclick="toggleAuthMode()" class="text-decoration-none ms-1" style="color: var(--primary-color);">Sign In</a>
            </div>
        </div>

        <div class="text-center mt-4 pt-3 border-top" style="border-color: rgba(255,255,255,0.1) !important;">
            <a href="terms.html" class="text-secondary small text-decoration-none hover-white">Terms & Conditions</a>
        </div>
    </div>

    <!-- Global Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner-glow mb-3"></div>
        <p class="text-white fw-bold">Processing...</p>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
